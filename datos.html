<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="images/bicycle.svg">
    <title>Mi Perfil - Affitto</title>
</head>
<body class="BodyDatos">
    <script src="script.js"></script>
    <header>
        <nav class="navbar">
            <ul>
                <li class="nav-item">
                    <a class="hover-effect-3" aria-current="page" href="inicio.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="hover-effect-3" href="alquileres.html#filterzone-alquileres">Alquileres</a>
                </li>
                <li class="nav-item">
                    <a class="hover-effect-3" href="estaciones.html#filterzone-estaciones">Estaciones</a>
                </li>
                <li class="nav-item">
                    <a class="hover-effect-3" href="datos.html">Mi Perfil</a>
                </li>
                <li class="nav-item">
                    <a class="hover-effect-3" href="contacto.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="HeaderPerfil">
        <img src="images/slider1.jpg" alt="Imagen de fondo" id="ImagenContacto">
        <div class="TextoDatos">
            <h1 class="TituloDatos">Mi Perfil</h1>
        </div>
        <div class="capa"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="profile-container">
                    <div class="text-end mb-3">
                        <button class="btn btn-primary edit-btn">
                            <i class="bi bi-pencil-square"></i> Editar Perfil
                        </button>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 text-center">
                            <img src="images/user.png" alt="Foto de perfil" class="profile-image mb-3">
                        </div>
                        <div class="col-md-8 d-flex flex-column justify-content-center">
                            <h2 class="profile-name">Luciano</h2>
                            <h3 class="profile-lastname">Ollaquindia</h3>
                        </div>
                    </div>
                    
                    <div class="form-container mt-4">
                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" value="402184@sistemas.frc.utn.edu.ar" readonly>
                            </div>
                            
                            <div class="mb-3">
                                <label for="birthdate" class="form-label">Fecha de nacimiento</label>
                                <input type="date" class="form-control" id="birthdate" value="2004-03-31" readonly>
                            </div>
                            
                            <div class="mb-3">
                                <label for="phone" class="form-label">Teléfono</label>
                                <input type="text" class="form-control" id="phone" value="+54 3541 231822" readonly>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
